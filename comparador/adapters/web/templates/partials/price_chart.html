<div class="chart-section" style="margin-top: 3rem;">
  <h2 id="price-history" style="scroll-margin-top: 100px;">Histórico de preços</h2>
  <div class="chart-wrap" style="position: relative; width: 100%;"><canvas id="priceChart"></canvas></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<script src="https://cdn.jsdelivr.net/npm/luxon@3"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-luxon@1"></script>
<script>
const series = {{ history_json | safe }};

// Helper to convert hex color to rgba for the fill background
function hexToRgba(hex, alpha) {
    let r = parseInt(hex.slice(1, 3), 16);
    let g = parseInt(hex.slice(3, 5), 16);
    let b = parseInt(hex.slice(5, 7), 16);
    return `rgba(${r}, ${g}, ${b}, ${alpha})`;
}

const chartColorHex = '{{ chart_color | default("#00d4b5") }}';
const chartBgColor = hexToRgba(chartColorHex, 0.15);

const hasData = series.some(s => s.data && s.data.length > 0);

if (!hasData) {
  document.querySelector('.chart-wrap').innerHTML =
    '<p class="empty">Sem histórico ainda. Rode o crawler mais vezes para acumular pontos.</p>';
} else {
  // Preprocess data to create smooth flat lines and proportional diagonal slopes
  const today = new Date();
  today.setHours(23, 59, 59, 999);

  series.forEach(s => {
    if (!s.data || s.data.length === 0) return;
    s.data.sort((a, b) => new Date(a.x) - new Date(b.x));
    const filled = [];
    
    for (let i = 0; i < s.data.length - 1; i++) {
      let t1 = new Date(s.data[i].x).getTime();
      let t2 = new Date(s.data[i + 1].x).getTime();
      let y1 = s.data[i].y;
      let y2 = s.data[i + 1].y;
      
      let priceDiff = Math.abs(y2 - y1);
      let avgPrice = (y1 + y2) / 2 || 1;
      let percentChange = priceDiff / avgPrice;
      
      let totalHours = (t2 - t1) / 3600000;
      let maxAllowedSlope = totalHours * 0.8; 
      
      let slopeHours = Math.min(Math.max(24, percentChange * 240), maxAllowedSlope);
      let slopeStartTime = t2 - (slopeHours * 3600000);
      
      let current = new Date(t1);
      while (current.getTime() < slopeStartTime) {
        filled.push({ x: current.toISOString(), y: y1, trueDate: t1, trueY: y1, isSlope: false });
        current.setHours(current.getHours() + 1);
      }
      
      current = new Date(slopeStartTime);
      while (current.getTime() < t2) {
        let progress = (current.getTime() - slopeStartTime) / (slopeHours * 3600000);
        let interpolatedY = y1 + progress * (y2 - y1);
        filled.push({ x: current.toISOString(), y: interpolatedY, trueDate: t2, trueY: y2, isSlope: true });
        current.setHours(current.getHours() + 1);
      }
    }
    
    const last = s.data[s.data.length - 1];
    let current = new Date(last.x);
    const lastTime = current.getTime();
    
    while (current <= today) {
      filled.push({ x: current.toISOString(), y: last.y, trueDate: lastTime, trueY: last.y, isSlope: false });
      current.setHours(current.getHours() + 1);
    }
    s.data = filled;
  });

  const datasets = series.map((s, i) => {
    return {
      label: s.label,
      data: s.data,
      borderColor: chartColorHex,
      backgroundColor: chartBgColor,
      fill: true,
      tension: 0, 
      stepped: false,
      borderWidth: 3,
      pointRadius: 0,
      pointHoverRadius: 6,
      spanGaps: true,
    };
  });

  const allPrices = datasets[0].data.map(p => p.y);
  const minPrice = Math.min(...allPrices);
  const maxPrice = Math.max(...allPrices);
  const padding = Math.max((maxPrice - minPrice) * 0.15, maxPrice * 0.05);

  const baseHeight = 420;
  const extraLegendHeight = Math.max(0, (series.length - 4) * 25);
  document.querySelector('.chart-wrap').style.height = (baseHeight + extraLegendHeight) + 'px';

  const tickColor  = '#94a3b8';
  const gridColor  = 'rgba(46,51,71,0.8)';
  new Chart(document.getElementById('priceChart'), {
    type: 'line',
    data: { datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: false,
      color: tickColor,
      interaction: {
        mode: 'nearest',
        axis: 'x',
        intersect: false,
      },
      scales: {
        x: {
          type: 'time',
          time: { unit: 'day', tooltipFormat: 'dd MMM yyyy' },
          ticks: { color: tickColor },
          grid:  { color: gridColor },
        },
        y: {
          suggestedMin: Math.max(0, minPrice - padding),
          suggestedMax: maxPrice + padding,
          ticks: { color: tickColor, callback: v => 'R$ ' + Number(v).toFixed(2) },
          grid:  { color: gridColor },
        },
      },
      plugins: {
        legend: {
          display: false,
        },
        tooltip: {
          backgroundColor: '#1a1d27',
          borderColor: '#2e3347',
          borderWidth: 1,
          titleColor: '#e2e8f0',
          bodyColor: '#94a3b8',
          callbacks: {
            title: function(context) {
              const dt = new Date(context[0].raw.trueDate);
              return dt.toLocaleDateString('pt-BR', {day: '2-digit', month: 'short', year: 'numeric'});
            },
            label: function(ctx) {
              return 'Menor Preço: R$ ' + ctx.raw.trueY.toFixed(2);
            }
          }
        }
      },
    }
  });
}
</script>
